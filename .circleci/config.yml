version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.14
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install uv
          command: pip install --user uv
      - run:
          name: Sync dependencies
          command: ~/.local/bin/uv sync
      - run:
          name: Run tests
          command: ~/.local/bin/uv run pytest

  build_and_push_image:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Validate registry configuration
          command: |
            test -n "${DOCKER_USERNAME}"
            test -n "${DOCKER_PASSWORD}"
            test -n "${DOCKER_IMAGE_REPOSITORY}"
      - run:
          name: Build and push image
          command: |
            SHORT_SHA=$(printf '%s' "${CIRCLE_SHA1}" | cut -c1-7)

            if [ -n "${CIRCLE_TAG}" ]; then
              IMAGE_TAG="${CIRCLE_TAG}"
              if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[[:alnum:]_][[:alnum:]_.-]{0,127}$'; then
                echo "Git tag '${IMAGE_TAG}' is not a valid Docker image tag"
                exit 1
              fi
            else
              IMAGE_TAG=$(printf '%s' "${CIRCLE_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')
            fi

            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            docker build -t "${DOCKER_IMAGE_REPOSITORY}:${IMAGE_TAG}" -t "${DOCKER_IMAGE_REPOSITORY}:${SHORT_SHA}" .
            docker push "${DOCKER_IMAGE_REPOSITORY}:${IMAGE_TAG}"
            docker push "${DOCKER_IMAGE_REPOSITORY}:${SHORT_SHA}"

workflows:
  test_build_and_push:
    jobs:
      - test:
          filters:
            tags:
              only: /.*/
      - build_and_push_image:
          requires:
            - test
          filters:
            tags:
              only: /.*/
